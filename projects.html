<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Mustafa Kamal</title>
<style>
  :root {
    --teal: #1D9E75; --teal-light: #E1F5EE; --teal-mid: #5DCAA5; --teal-dark: #0F6E56;
    --amber-light: #FAEEDA; --amber-dark: #854F0B;
    --blue-light: #E6F1FB; --blue-dark: #185FA5;
    --purple-light: #EEEDFE; --purple-dark: #534AB7;
    --text: #1a1a1a; --text-sec: #6b6b6b; --text-ter: #9a9a9a;
    --bg: #ffffff; --bg-sec: #f7f7f5; --bg-ter: #f0efec;
    --border: rgba(0,0,0,0.1); --border-mid: rgba(0,0,0,0.18);
    --radius: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); border-bottom: 0.5px solid var(--border); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .nav-logo { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; text-decoration: none; }
  .nav-logo span { color: var(--teal); }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a { font-size: 13px; color: var(--text-sec); text-decoration: none; transition: color 0.15s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-hire { font-size: 13px; padding: 7px 18px; background: var(--text); color: #fff; border-radius: var(--radius); font-weight: 500; text-decoration: none; transition: opacity 0.15s; }
  .nav-hire:hover { opacity: 0.85; }
  .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
  .hamburger span { display: block; width: 20px; height: 1.5px; background: var(--text); margin: 4px 0; }
  .mobile-menu { display: none; position: fixed; top: 60px; left: 0; right: 0; background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 20px 24px; z-index: 99; flex-direction: column; gap: 16px; }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { font-size: 15px; color: var(--text-sec); text-decoration: none; }

  /* PAGE HEADER */
  .page-header { padding: 52px 40px 40px; border-bottom: 0.5px solid var(--border); max-width: 1100px; margin: 0 auto; }
  .page-header-eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-ter); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .page-header-eyebrow::before { content: ''; display: inline-block; width: 28px; height: 1.5px; background: var(--teal); }
  .page-header h1 { font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 600; letter-spacing: -0.02em; color: var(--text); margin-bottom: 10px; }
  .page-header h1 em { font-style: normal; color: var(--teal); }
  .page-header p { font-size: 14px; color: var(--text-sec); max-width: 480px; }
  .back-link { font-size: 13px; color: var(--text-ter); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; transition: color 0.15s; }
  .back-link:hover { color: var(--teal); }

  /* SECTION */
  .section { padding: 48px 40px; border-bottom: 0.5px solid var(--border); }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .sec-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-ter); display: flex; align-items: center; gap: 10px; }
  .sec-title::after { content: ''; display: inline-block; width: 40px; height: 0.5px; background: var(--border); }
  .sec-count { font-size: 12px; color: var(--text-ter); background: var(--bg-sec); border-radius: 20px; padding: 2px 10px; }

  /* ONGOING CARD */
  .ongoing-card { border: 2px solid var(--teal); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 16px; }
  .ongoing-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px 0; flex-wrap: wrap; gap: 8px; }
  .in-progress { display: flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 600; color: var(--teal-dark); background: var(--teal-light); border-radius: 4px; padding: 4px 12px; }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .ongoing-img { margin: 14px 24px 0; height: 160px; background: var(--teal-light); border-radius: var(--radius); border: 0.5px solid var(--teal-mid); display: flex; align-items: center; justify-content: center; gap: 20px; overflow: hidden; }
  .ongoing-img img { width: 100%; height: 100%; object-fit: cover; }
  .ongoing-img svg { width: 40px; height: 40px; stroke: var(--teal); fill: none; stroke-width: 1.5; }
  .chip-label { font-size: 12px; font-weight: 500; color: var(--teal-dark); background: #fff; border: 0.5px solid var(--teal-mid); border-radius: 4px; padding: 5px 12px; }
  .ongoing-body { padding: 18px 24px 24px; }
  .ongoing-body h3 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .ongoing-body p { font-size: 14px; color: var(--text-sec); line-height: 1.7; margin-bottom: 20px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-ter); margin-bottom: 7px; }
  .progress-track { height: 4px; background: var(--bg-sec); border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
  .progress-fill { height: 100%; background: var(--teal); border-radius: 2px; }
  .stages { display: flex; justify-content: space-between; position: relative; margin-bottom: 20px; }
  .stages-line-bg { position: absolute; top: 5px; left: 5%; right: 5%; height: 1.5px; background: var(--border); z-index: 0; }
  .stages-line-done { position: absolute; top: 5px; left: 5%; height: 1.5px; background: var(--teal); z-index: 1; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 7px; flex: 1; position: relative; z-index: 2; }
  .stage-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--bg-sec); border: 1.5px solid var(--border-mid); }
  .stage-dot.done { background: var(--teal); border-color: var(--teal); }
  .stage-dot.active { background: #fff; border: 2.5px solid var(--teal); box-shadow: 0 0 0 3px var(--teal-light); }
  .stage-lbl { font-size: 10px; color: var(--text-ter); text-align: center; line-height: 1.3; }
  .stage-lbl.active { color: var(--teal-dark); font-weight: 600; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip { font-size: 10px; color: var(--text-ter); background: var(--bg-sec); border-radius: 4px; padding: 2px 8px; border: 0.5px solid var(--border); }
  .tag { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; font-weight: 500; }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag-motor { background: var(--teal-light); color: var(--teal-dark); }
  .tag-power { background: var(--amber-light); color: var(--amber-dark); }
  .tag-iot { background: var(--blue-light); color: var(--blue-dark); }
  .tag-usb { background: var(--purple-light); color: var(--purple-dark); }
  .tag-fpga { background: var(--purple-light); color: var(--purple-dark); }
  .tag-dsp { background: var(--teal-light); color: var(--teal-dark); }

  /* ONGOING GRID — 2 columns for multiple */
  .ongoing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .ongoing-grid .ongoing-card { margin-bottom: 0; }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .filter-btn { font-size: 12px; padding: 6px 14px; border: 0.5px solid var(--border-mid); border-radius: 20px; background: var(--bg); color: var(--text-sec); cursor: pointer; transition: all 0.12s; }
  .filter-btn:hover { background: var(--bg-sec); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* PROJECT GRID — 3 col, all equal size, no span */
  .proj-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .proj-card { background: var(--bg); padding: 22px; transition: background 0.12s; display: flex; flex-direction: column; grid-column: span 1 !important; }
  .proj-card:hover { background: var(--bg-sec); }
  .proj-card-img { height: 120px; border-radius: var(--radius); margin-bottom: 16px; display: flex; align-items: center; justify-content: center; border: 0.5px solid var(--border); overflow: hidden; flex-shrink: 0; }
  .proj-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .proj-card-img svg { width: 32px; height: 32px; stroke-width: 1.5; fill: none; }
  .img-teal { background: var(--teal-light); border-color: var(--teal-mid) !important; }
  .img-teal svg { stroke: var(--teal); }
  .img-amber { background: var(--amber-light); }
  .img-amber svg { stroke: var(--amber-dark); }
  .img-blue { background: var(--blue-light); }
  .img-blue svg { stroke: var(--blue-dark); }
  .img-purple { background: var(--purple-light); }
  .img-purple svg { stroke: var(--purple-dark); }
  .proj-card h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 7px; line-height: 1.4; }
  .proj-card p { font-size: 12px; color: var(--text-sec); line-height: 1.65; margin-bottom: 14px; flex: 1; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip { font-size: 10px; color: var(--text-ter); background: var(--bg-sec); border-radius: 4px; padding: 2px 8px; border: 0.5px solid var(--border); }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-ter); font-size: 14px; grid-column: 1/-1; }

  /* FOOTER */
  footer { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  footer p { font-size: 12px; color: var(--text-ter); }
  .footer-links { display: flex; gap: 20px; }
  .footer-links a { font-size: 12px; color: var(--text-ter); text-decoration: none; }
  .footer-links a:hover { color: var(--text-sec); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .proj-grid { grid-template-columns: repeat(2, 1fr); }
    .ongoing-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 680px) {
    nav { padding: 0 20px; }
    .nav-links { display: none; }
    .hamburger { display: block; }
    .section { padding: 36px 20px; }
    .page-header { padding: 36px 20px 28px; }
    .proj-grid { grid-template-columns: 1fr; }
    footer { padding: 16px 20px; }
  }
</style>

<script>
// ========== SHARED DATA (same localStorage keys as index.html) ==========
const defaultProjects = [
  { id:1, title:'3-Phase Inverter for BLDC Motor', cat:'motor', featured:true, icon:'motor', desc:'Full hardware design for Shell Eco-marathon. MOSFET selection, gate drivers, DC bus, current sensing, overcurrent and thermal protection. Validated 120° phase-displaced waveforms on oscilloscope.', chips:['37–42 V','15 A','Altium Designer','LTspice','MATLAB'], image:'' },
  { id:2, title:'37V–42V 15A Battery Pack', cat:'power', featured:false, icon:'power', desc:'High-current Li-ion pack for Shell Eco-marathon. Cell layout, spot welding, BMS integration, balancing, over/under-voltage and short-circuit protection.', chips:['Li-ion','BMS','High current'], image:'' },
  { id:3, title:'Raspberry Pi Extension Board', cat:'iot', featured:false, icon:'iot', desc:'Custom extension board with dual BNO055 IMU, PA1010D GPS, 6 GPIO LEDs, LM317 LDO regulator, and XL4015 DC-DC converter from 12V input.', chips:['I2C / SPI','GPS + IMU','Altium'], image:'' },
  { id:4, title:'USB 2.0 Hub', cat:'usb', featured:false, icon:'usb', desc:'4-port hub using TUSB2046IBVFR. Impedance-controlled USB differential pair routing, ESD protection on all ports, multi-peripheral power distribution.', chips:['Diff pairs','ESD protection','Signal integrity'], image:'' },
  { id:5, title:'Custom ESP32 Development Board', cat:'iot', featured:false, icon:'iot', desc:'USB-to-UART connectivity, power regulation, GPIO breakout. Designed following Robert Feranec methodology. Full bring-up and testing completed.', chips:['ESP32','UART','IoT'], image:'' },
  { id:6, title:'3W RGB LED Driver Board', cat:'power', featured:false, icon:'led', desc:'Constant-current PWM driver for high-power RGB LEDs. Switching circuitry optimised for low losses, smooth colour transitions, thermal management.', chips:['PWM','Constant current','Thermal design'], image:'' },
  { id:7, title:'5V Relay Control Board', cat:'power', featured:false, icon:'power', desc:'Transistor driver and flyback diode enabling MCU control of 12V relay. Status LEDs, safe high/low voltage interfacing for competition vehicle.', chips:['5V logic','12V relay','Protection'], image:'' },
  { id:8, title:'220V AC to 48V DC Converter', cat:'power', featured:false, icon:'power', desc:'First Altium Designer PCB sent to production. AC-DC step-down with high-voltage clearances and safety spacing. Full design-to-manufacture cycle.', chips:['220V AC','High voltage','Production-ready'], image:'' },
];
const defaultOngoing = {
  title: 'Custom FPGA Development Board', chip: 'Xilinx / AMD',
  desc: 'Designing a custom Xilinx-based PCB for signal processing and DSP applications. Board includes power regulation, JTAG programming interface, clock distribution, and I/O headers — fully designed in Altium Designer.',
  stage: 2, tags: ['FPGA','Signal processing','Altium Designer','JTAG','DSP','Clock distribution'], image: ''
};
const defaultProfile = { name:'Mustafa Kamal', email:'mustafakamal.mk2017@gmail.com' };

function ls(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
function loadProjects() { return ls('mk_projects', defaultProjects); }
function loadOngoing() { return ls('mk_ongoing', defaultOngoing); }
function loadProfile() { return ls('mk_profile', defaultProfile); }

// GitHub sync (reads same config as index.html)
function ghLoadConfig() { try { return JSON.parse(localStorage.getItem('mk_gh_cfg')) || {}; } catch(e) { return {}; } }
async function syncFromCloud() {
  const c = ghLoadConfig();
  if (!c.owner || !c.repo) return false;
  try {
    const branch = c.branch || 'main';
    const url = `https://cdn.jsdelivr.net/gh/${c.owner}/${c.repo}@${branch}/data.json?t=` + Date.now();
    const res = await fetch(url);
    if (!res.ok) return false;
    const data = await res.json();
    // Only cache non-empty values — never wipe good local data with empty arrays
    const map = { profile:'mk_profile', projects:'mk_projects', ongoing:'mk_ongoing', skills:'mk_skills', exp:'mk_exp', edu:'mk_edu', certs:'mk_certs' };
    Object.entries(map).forEach(([dk, lk]) => {
      const val = data[dk];
      if (val === undefined || val === null) return;
      if (Array.isArray(val) && val.length === 0 && dk !== 'certs') return;
      localStorage.setItem(lk, JSON.stringify(val));
    });
    return true;
  } catch(e) { return false; }
}

const catColors = { motor:'tag-motor', power:'tag-power', iot:'tag-iot', usb:'tag-usb', fpga:'tag-fpga', dsp:'tag-dsp' };
const catLabels = { motor:'Motor control', power:'Power', iot:'IoT / Sensing', usb:'USB / High-speed', fpga:'FPGA', dsp:'Signal processing' };
const imgColors = { motor:'img-teal', power:'img-amber', iot:'img-blue', usb:'img-purple', board:'img-teal', led:'img-amber' };
const icons = {
  motor:`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`,
  power:`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="2" y="7" width="20" height="11" rx="2"/><path d="M7 7V5M17 7V5M12 11v3M10 13h4"/></svg>`,
  iot:`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0"/><circle cx="12" cy="20" r="1"/></svg>`,
  usb:`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M12 2v10M8 8h8M7 12h10M9 16h6M12 20v2"/><circle cx="12" cy="20" r="1"/></svg>`,
  board:`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 7h2v2H7zM15 7h2v2h-2zM7 15h2v2H7zM15 15h2v2h-2zM9 8h6M8 9v6M16 9v6M9 16h6"/></svg>`,
  led:`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M12 2a7 7 0 017 7c0 3-2 5-3 7H8c-1-2-3-4-3-7a7 7 0 017-7z"/><path d="M9 21h6M10 17v4M14 17v4"/></svg>`,
};

let activeFilter = 'all';

function renderOngoing() {
  const o = loadOngoing();
  const container = document.getElementById('ongoingContainer');
  document.getElementById('ongoing-count').textContent = (o && o.title) ? '1' : '0';
  if (!o || !o.title) {
    container.innerHTML = '<p style="color:var(--text-ter);font-size:13px;padding:20px 0;">No ongoing project currently.</p>';
    return;
  }
  const stages = ['Schematic','Component sel.','PCB layout','Fabrication','Testing'];
  const pct = [5,25,45,65,85];
  const lineW = ['5%','20%','38%','60%','80%'][o.stage] || '5%';
  const imgContent = o.image
    ? `<img src="${o.image}" alt="${o.title}">`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 7h2v2H7zM15 7h2v2h-2zM7 15h2v2H7zM15 15h2v2h-2zM9 8h6M8 9v6M16 9v6M9 16h6"/></svg><div class="chip-label">${o.chip}</div>`;
  container.innerHTML = `
    <div class="ongoing-card">
      <div class="ongoing-top">
        <div style="display:flex;gap:6px;flex-wrap:wrap">${(o.tags||[]).slice(0,2).map(t=>`<span class="tag tag-fpga">${t}</span>`).join('')}</div>
        <div class="in-progress"><div class="pulse"></div>In progress</div>
      </div>
      <div class="ongoing-img">${imgContent}</div>
      <div class="ongoing-body">
        <h3>${o.title}</h3>
        <p>${o.desc}</p>
        <div class="progress-label"><span>Design progress</span><span>${stages[o.stage]||''}</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct[o.stage]||5}%"></div></div>
        <div class="stages">
          <div class="stages-line-bg"></div>
          <div class="stages-line-done" style="width:${lineW}"></div>
          ${stages.map((s,i)=>`<div class="stage"><div class="stage-dot ${i<o.stage?'done':i===o.stage?'active':''}"></div><div class="stage-lbl ${i===o.stage?'active':''}">${s}</div></div>`).join('')}
        </div>
        <div class="chips">${(o.tags||[]).map(t=>`<span class="chip">${t}</span>`).join('')}</div>
      </div>
    </div>`;
}

function renderProjects() {
  const all = loadProjects();
  // Build filter buttons from unique cats
  const cats = [...new Set(all.map(p=>p.cat))];
  const filterBar = document.getElementById('filterBar');
  filterBar.innerHTML = `<button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All (${all.length})</button>` +
    cats.map(c=>`<button class="filter-btn ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${catLabels[c]||c} (${all.filter(p=>p.cat===c).length})</button>`).join('');

  const filtered = activeFilter === 'all' ? all : all.filter(p=>p.cat===activeFilter);
  document.getElementById('proj-count').textContent = filtered.length;
  const grid = document.getElementById('projectGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">No projects in this category yet.</div>';
    return;
  }
  // All cards equal — no span2
  grid.innerHTML = filtered.map(p => {
    const imgHtml = p.image ? `<img src="${p.image}" alt="${p.title}">` : (icons[p.icon]||icons.board);
    return `<div class="proj-card">
      <div class="proj-card-img ${p.image?'':(imgColors[p.icon]||'img-teal')}">${imgHtml}</div>
      <div class="tag-row"><span class="tag ${catColors[p.cat]||'tag-motor'}">${catLabels[p.cat]||p.cat}</span></div>
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <div class="chips">${(p.chips||[]).map(c=>`<span class="chip">${c}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderProjects();
}

function renderProfile() {
  const p = loadProfile();
  document.getElementById('footer-copy').textContent = `© ${new Date().getFullYear()} ${p.name||'Mustafa Kamal'}`;
}

function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}

// Secret admin trigger (same as index.html)
(function() {
  const secret = 'mkadmin';
  let buf = '';
  document.addEventListener('keypress', function(e) {
    if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
    buf += e.key.toLowerCase();
    if (buf.length > secret.length) buf = buf.slice(-secret.length);
    if (buf === secret) { buf = ''; window.location.href = 'index.html?admin=1'; }
  });
})();

// Scroll to #ongoing if hash present
if (window.location.hash === '#ongoing') {
  window.addEventListener('load', function() {
    const el = document.getElementById('ongoing');
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  });
}

// Render from cache/defaults immediately
renderProfile();
renderOngoing();
renderProjects();

// Then sync from GitHub if configured and data is valid
(async function() {
  const cfg = ghLoadConfig();
  if (!cfg.owner || !cfg.repo) return;
  try {
    const ok = await syncFromCloud();
    if (ok) { renderProfile(); renderOngoing(); renderProjects(); }
  } catch(e) {}
})();

// Fast navigation back to index
(function() {
  // Prefetch index on load
  var link = document.createElement('link');
  link.rel = 'prefetch'; link.href = 'index.html';
  document.head.appendChild(link);
  // Fade on navigate
  document.querySelectorAll('a[href]').forEach(function(a) {
    a.addEventListener('click', function(e) {
      var href = this.getAttribute('href');
      if (!href || href.startsWith('mailto') || href.startsWith('#') || this.target === '_blank') return;
      e.preventDefault();
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 0.15s';
      setTimeout(function() { window.location.href = href; }, 140);
    });
  });
  window.addEventListener('pageshow', function() {
    document.body.style.opacity = '1';
  });
})();
</script>
</body>
